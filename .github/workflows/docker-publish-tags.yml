name: Build and Publish (Tags)

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: zcq98/clouddrive-auto-save
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v6
        with:
          username: zcq98
          password: ${{ secrets.DOCKER_SECRET }}

      - name: Extract Tag Version
        id: vars
        run: echo "VERSION_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
